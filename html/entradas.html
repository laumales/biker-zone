<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto parqueadero</title>
</head>

<body>
    <h1>Registro De Entrada</h1>


    <form>
        <label>Placa De Motocicleta</label>
        <input type="text" id="ingreseplaca" placeholder="ingrese placa">
        <br>
        <label>Número de cascos:</label> 
        <input type="text"  id="numerodecascos"> <br>
        <label> Tipo De Cliente</label> 
        <label for="Hora">

            <input type="radio" name="tipoCobro"  value="Hora" checked>
            Hora O Fracción
        </label>

        <label for="Dia">
            <input type="radio" name="tipoCobro"  value="Dia">
            Dia
        </label>

        <label for="Mensualidad">

            <input type="radio" name="tipoCobro"  value="Mensualidad">
            Mensualidad
        </label> <br>
        <button type="submit"> Registrar Entrada </button>
    </form>

</html>
