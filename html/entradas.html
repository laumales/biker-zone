<h1>Registro De Entrada</h1>

<form>

</form>
<h2>Número de casco</h2>
<form>
    <input type="text" name ="tipoCobro" id="numerodecascos">
</form>
<h2> TIPO DE CLIENTE</h2>

     Hora O Fracción

    <label for="Dia">
    <input type="radio" name="tipoCobro" id="Dia" value="Dia">    
     Dia
    </label>

     Mensualidad
    </label> <br>
    <button type="submit"> Registrar Entrada </button>
</form>
